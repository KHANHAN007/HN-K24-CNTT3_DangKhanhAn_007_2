<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${artwork.id == null ? 'Thêm tác phẩm mới' : 'Cập nhật tác phẩm'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 th:text="${artwork.id == null ? 'Thêm tác phẩm mới' : 'Cập nhật tác phẩm'}" class="mb-4"></h2>

            <form th:action="@{${artwork.id == null ? '/artworks/save' : '/artworks/update'}}"
                  method="post"
                  enctype="multipart/form-data"
                  th:object="${artwork}">

                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{artImage}">

                <div class="mb-3">
                    <label for="title" class="form-label">Tên tác phẩm <span class="text-danger">*</span></label>
                    <input type="text" id="title" th:field="*{title}"
                           class="form-control" th:classappend="${#fields.hasErrors('title') ? 'is-invalid' : ''}"
                           placeholder="Nhập tên tác phẩm (5-150 ký tự)">
                    <small class="text-danger" th:errors="*{title}"></small>
                </div>

                <div class="mb-3">
                    <label for="artist" class="form-label">Tên họa sĩ <span class="text-danger">*</span></label>
                    <input type="text" id="artist" th:field="*{artist}"
                           class="form-control" th:classappend="${#fields.hasErrors('artist') ? 'is-invalid' : ''}"
                           placeholder="Nhập tên họa sĩ">
                    <small class="text-danger" th:errors="*{artist}"></small>
                </div>

                <div class="mb-3">
                    <label for="year" class="form-label">Năm sáng tác <span class="text-danger">*</span></label>
                    <input type="number" id="year" th:field="*{year}"
                           class="form-control" th:classappend="${#fields.hasErrors('year') ? 'is-invalid' : ''}"
                           placeholder="Nhập năm sáng tác">
                    <small class="text-danger" th:errors="*{year}"></small>
                </div>

                <div class="mb-3">
                    <label for="file" class="form-label">Ảnh tác phẩm</label>
                    <div th:if="${artwork.id != null and !#strings.isEmpty(artwork.artImage)}" class="mb-2">
                        <p><strong>Ảnh hiện tại:</strong></p>
                        <img th:src="@{/uploads/{img}(img=${artwork.artImage})}"
                             style="width:150px; height:150px; object-fit:cover; border-radius:8px; border:2px solid #007bff;"
                             onerror="this.src='/uploads/avatar-default.jpeg'">
                    </div>
                    <input type="file" id="file" name="file" class="form-control" accept="image/*">
                    <small class="text-muted" th:if="${artwork.id == null}">Chọn file ảnh (.jpg, .png)</small>
                    <small class="text-muted" th:if="${artwork.id != null}">Để trống nếu muốn giữ ảnh hiện tại</small>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1">Lưu</button>
                    <a th:href="@{/artworks}" class="btn btn-secondary flex-grow-1">Quay lại</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
