<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form nhân sự</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 th:text="${member.id == null ? 'Thêm nhân sự' : 'Cập nhật nhân sự'}"></h2>

<form th:action="@{${member.id == null ? '/members/save' : '/members/update'}}"
      method="post"
      enctype="multipart/form-data"
      th:object="${member}">

    <input type="hidden" th:field="*{id}">
    <input type="hidden" th:field="*{avatar}">

    <div class="mb-3">
        <label>Họ tên</label>
        <input type="text" th:field="*{fullName}" class="form-control">
        <small class="text-danger" th:errors="*{fullName}"></small>
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="text" th:field="*{email}" class="form-control">
        <small class="text-danger" th:errors="*{email}"></small>
    </div>

    <div class="mb-3">
        <label>Vị trí</label>
        <select th:field="*{position}" class="form-select">
            <option value="">-- Chọn --</option>
            <option value="Developer">Developer</option>
            <option value="Tester">Tester</option>
            <option value="PM">PM</option>
            <option value="Bridge SE">Bridge SE</option>
        </select>
        <small class="text-danger" th:errors="*{position}"></small>
    </div>

    <div class="mb-3">
        <label>Kinh nghiệm (năm)</label>
        <input type="number" step="0.1" th:field="*{experienceYears}" class="form-control">
        <small class="text-danger" th:errors="*{experienceYears}"></small>
    </div>

    <div class="mb-3">
        <label>Ảnh đại diện</label>
        <div class="mb-2" th:if="${!#strings.isEmpty(member.avatar)}">
            <img th:src="@{/uploads/{img}(img=${member.avatar})}"
                 alt="Current avatar"
                 style="width:120px; height:120px; object-fit:cover; border-radius:8px;">
        </div>
        <input type="file" name="file" accept="image/*"/>
        <small class="text-muted d-block">Để trống nếu muốn giữ ảnh hiện tại.</small>
    </div>

    <button class="btn btn-primary">Lưu</button>
    <a th:href="@{/members}" class="btn btn-secondary">Quay lại</a>

</form>

</body>
</html>
