<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
    <h2>Danh sách nhân sự</h2>
    <form id="searchForm" method="get" th:action="@{/members}" class="row mb-3">
        <div class="col-md-4">
            <input id="keywordInput" type="text" name="keyword" class="form-control" placeholder="Tìm kiếm theo tên hoặc email" th:value="${param.keyword}">
        </div>
        <div class="col-md-3">
            <select id="positionSelect" name="position" class="form-select">
                <option value="">-- Tất cả vị trí --</option>
                <option value="Developer" th:selected="${param.position != null and param.position[0] == 'Developer'}">Developer</option>
                <option value="Tester" th:selected="${param.position != null and param.position[0] == 'Tester'}">Tester</option>
                <option value="PM" th:selected="${param.position != null and param.position[0] == 'PM'}">PM</option>
                <option value="Bridge SE" th:selected="${param.position != null and param.position[0] == 'Bridge SE'}">Bridge SE</option>
            </select>
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary">Tìm</button>
        </div>

        <div class="col-md-3 text-end">
            <a th:href="@{/members/create}" class="btn btn-success">+ Thêm mới</a>
        </div>
    </form>
    <div th:if="${#lists.isEmpty(members)}" class="alert alert-warning">
        Hiện chưa có nhân sự nào được phân bổ cho dự án này.
    </div>

    <div class="row" th:if="${!#lists.isEmpty(members)}">
        <div class="col-md-4 mb-3" th:each="m : ${members}">
            <div class="card shadow-sm">
                <img th:src="${!#strings.isEmpty(m.avatar)} ? @{/uploads/{img}(img=${m.avatar})} : @{/uploads/avatar-default.jpeg}"
                     class="card-img-top"
                     style="height:200px; object-fit:cover"
                     onerror="this.src='/uploads/avatar-default.jpeg'">

                <div class="card-body">
                    <h5 th:text="${m.fullName}"></h5>
                    <p>Email: <span th:text="${m.email}"></span></p>
                    <p>Vị trí: <span th:text="${m.position}"></span></p>
                    <p>Kinh nghiệm: <span th:text="${m.experienceYears}"></span> năm</p>

                    <a th:href="@{/members/edit/{id}(id=${m.id})}" class="btn btn-warning btn-sm">Sửa</a>

                    <a th:href="@{/members/delete/{id}(id=${m.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa?')">
                        Xóa
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
<script>
    const searchForm = document.getElementById('searchForm');
    const keywordInput = document.getElementById('keywordInput');
    const positionSelect = document.getElementById('positionSelect');
    let keywordTimer;

    keywordInput.addEventListener('input', function () {
        clearTimeout(keywordTimer);
        keywordTimer = setTimeout(function () {
            searchForm.submit();
        }, 400);
    });

    positionSelect.addEventListener('change', function () {
        searchForm.submit();
    });
</script>
</body>
</html>
