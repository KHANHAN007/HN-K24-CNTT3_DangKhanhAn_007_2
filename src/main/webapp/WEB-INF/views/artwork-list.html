<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tác phẩm Nghệ thuật</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Quản lý Tác phẩm Nghệ thuật</h1>
        <form method="get" th:action="@{/artworks}" class="row g-3 mb-4">
            <div class="col-md-8">
                <input type="text" name="keyword" class="form-control" placeholder="Tìm kiếm theo tên tác phẩm hoặc họa sĩ..." 
                       th:value="${param.keyword}">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Tìm kiếm</button>
            </div>
            <div class="col-md-2">
                <a href="/artworks" class="btn btn-secondary w-100">Làm mới</a>
            </div>
            <div class="col-md-12 text-end">
                <a th:href="@{/artworks/create}" class="btn btn-success">+ Thêm tác phẩm mới</a>
            </div>
        </form>
        <div th:if="${#lists.isEmpty(artworks)}" class="alert alert-info text-center py-5">
            <h4>Hiện chưa có tác phẩm nào trong triển lãm</h4>
            <a th:href="@{/artworks/create}" class="btn btn-success mt-3">+ Thêm tác phẩm đầu tiên</a>
        </div>
        <div th:if="${!#lists.isEmpty(artworks)}" class="table-responsive">
            <table class="table table-hover table-striped">
                <thead class="table-primary">
                    <tr>
                        <th>STT</th>
                        <th>Ảnh</th>
                        <th>Tên tác phẩm</th>
                        <th>Họa sĩ</th>
                        <th>Năm sáng tác</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="artwork, stat : ${artworks}">
                        <td th:text="${stat.count}"></td>
                        <td>
                            <img th:src="${!#strings.isEmpty(artwork.artImage)} ? @{/uploads/{img}(img=${artwork.artImage})} : @{/uploads/avatar-default.jpeg}"
                                 alt="Artwork"
                                 style="width:80px; height:80px; object-fit:cover; border-radius:5px;"
                                 onerror="this.src='/uploads/avatar-default.jpeg'">
                        </td>
                        <td th:text="${artwork.title}"></td>
                        <td th:text="${artwork.artist}"></td>
                        <td th:text="${artwork.year}"></td>
                        <td>
                            <a th:href="@{/artworks/edit/{id}(id=${artwork.id})}" class="btn btn-warning btn-sm">Sửa</a>
                            <a th:href="@{/artworks/delete/{id}(id=${artwork.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Bạn có chắc muốn xóa?')">
                               Xóa
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
